name: CI

on:
  push:
    branches: ["main","develop"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux build and tests in Docker
        run: ./scripts/docker-test.sh

  build-deb:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: ubuntu
            image: ubuntu:24.04
            arch: i386
            platform: linux/386
          - flavor: ubuntu
            image: ubuntu:24.04
            arch: amd64
            platform: linux/amd64
          - flavor: ubuntu
            image: ubuntu:24.04
            arch: arm64
            platform: linux/arm64
          - flavor: debian
            image: debian:12
            arch: i386
            platform: linux/386
          - flavor: debian
            image: debian:12
            arch: amd64
            platform: linux/amd64
          - flavor: debian
            image: debian:12
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build DEB (${{ matrix.flavor }}-${{ matrix.arch }})
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          DEB_FLAVOR: ${{ matrix.flavor }}
          DEB_IMAGE: ${{ matrix.image }}
        run: ./scripts/docker-build-deb.sh

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-deb-${{ matrix.flavor }}-${{ matrix.arch }}
          path: dist/packages/deb/${{ matrix.flavor }}/${{ matrix.arch }}/*

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: i686
            platform: linux/amd64
            rpm_target: i686
          - arch: x86_64
            platform: linux/amd64
            rpm_target: x86_64
          - arch: aarch64
            platform: linux/arm64
            rpm_target: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build RPM (${{ matrix.arch }})
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          RPM_TARGET: ${{ matrix.rpm_target }}
        run: ./scripts/docker-build-rpm.sh

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-rpm-${{ matrix.arch }}
          path: dist/packages/rpm/${{ matrix.arch }}/*

