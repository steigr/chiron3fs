name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux build and tests in Docker
        run: ./scripts/docker-test.sh

  package-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DEB package on Ubuntu (amd64 smoke)
        env:
          DOCKER_PLATFORM: linux/amd64
          ARCH: amd64
          DEB_FLAVOR: ubuntu
          DEB_IMAGE: ubuntu:24.04
        run: ./scripts/docker-build-deb.sh

      - name: Build DEB package on Debian (amd64 smoke)
        env:
          DOCKER_PLATFORM: linux/amd64
          ARCH: amd64
          DEB_FLAVOR: debian
          DEB_IMAGE: debian:12
        run: ./scripts/docker-build-deb.sh

      - name: Build RPM package (x86_64 smoke)
        env:
          DOCKER_PLATFORM: linux/amd64
          ARCH: x86_64
          RPM_TARGET: x86_64
        run: ./scripts/docker-build-rpm.sh
