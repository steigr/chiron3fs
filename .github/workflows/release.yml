name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_debug_packages:
        description: "Publish debug symbol packages (.ddeb, -dbgsym, -debuginfo, -debugsource)"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Linux build and tests in Docker
        run: ./scripts/docker-test.sh

  build-deb:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: ubuntu
            image: ubuntu:26.04
            arch: amd64
            platform: linux/amd64
          - flavor: ubuntu
            image: ubuntu:26.04
            arch: arm64
            platform: linux/arm64
          - flavor: debian
            image: debian:13
            arch: i386
            platform: linux/386
          - flavor: debian
            image: debian:13
            arch: amd64
            platform: linux/amd64
          - flavor: debian
            image: debian:13
            arch: arm64
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build DEB (${{ matrix.flavor }}-${{ matrix.arch }})
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          DEB_FLAVOR: ${{ matrix.flavor }}
          DEB_IMAGE: ${{ matrix.image }}
        run: ./scripts/docker-build-deb.sh

      - name: Upload DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.flavor }}-${{ matrix.arch }}
          path: |
            dist/packages/deb/${{ matrix.flavor }}/${{ matrix.arch }}/*.deb
            dist/packages/deb/${{ matrix.flavor }}/${{ matrix.arch }}/*.ddeb

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - fedora_version: "42"
            arch: i686
            platform: linux/amd64
            rpm_target: i686
          - fedora_version: "42"
            arch: x86_64
            platform: linux/amd64
            rpm_target: x86_64
          - fedora_version: "42"
            arch: aarch64
            platform: linux/arm64
            rpm_target: aarch64
          - fedora_version: "43"
            arch: i686
            platform: linux/amd64
            rpm_target: i686
          - fedora_version: "43"
            arch: x86_64
            platform: linux/amd64
            rpm_target: x86_64
          - fedora_version: "43"
            arch: aarch64
            platform: linux/arm64
            rpm_target: aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build RPM (fc${{ matrix.fedora_version }}-${{ matrix.arch }})
        env:
          DOCKER_PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          RPM_TARGET: ${{ matrix.rpm_target }}
          RPM_IMAGE: fedora:${{ matrix.fedora_version }}
        run: ./scripts/docker-build-rpm.sh

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-fc${{ matrix.fedora_version }}-${{ matrix.arch }}
          path: |
            dist/packages/rpm/${{ matrix.arch }}/*.rpm
            !dist/packages/rpm/${{ matrix.arch }}/*.src.rpm

  publish:
    runs-on: ubuntu-latest
    needs: [build-deb, build-rpm]
    env:
      PUBLISH_DEBUG_PACKAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_debug_packages == true && 'true' || 'false' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Stage uniquely named release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          # Naming policy:
          # - Skip Debian metadata and source RPM files
          # - Skip debug packages unless explicitly enabled
          # - Keep DEB distro flavor prefix only (debian__/ubuntu__)
          # - Avoid duplicate uploads (e.g., same basename from different artifacts)
          find release-artifacts -mindepth 2 -type f -print0 | sort -z | while IFS= read -r -d '' file; do
            artifact_dir="$(basename "$(dirname "$file")")"
            base="$(basename "$file")"

            case "$base" in
              *.buildinfo|*.changes|*.src.rpm)
                echo "Skipping non-runtime asset: $base"
                continue
                ;;
            esac

            if [ "${PUBLISH_DEBUG_PACKAGES}" != "true" ]; then
              case "$base" in
                *.ddeb|*dbgsym*.deb|*-debuginfo-*.rpm|*-debugsource-*.rpm)
                  echo "Skipping debug asset: $base"
                  continue
                  ;;
              esac
            fi

            target="$base"

            case "$artifact_dir" in
              deb-*)
                flavor="${artifact_dir#deb-}"
                flavor="${flavor%-amd64}"
                flavor="${flavor%-arm64}"
                flavor="${flavor%-i386}"
                target="${flavor}__${base}"
                ;;
              rpm-*)
                target="$base"
                ;;
            esac

            if [ -e "release-assets/$target" ]; then
              echo "Skipping duplicate asset name: $target (from $file)"
              continue
            fi

            cp "$file" "release-assets/$target"
            echo "Staged: $target"
          done

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
